<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop the catalog — Volt &amp; Grain</title>
<meta name="description" content="Browse turntables, headphones, speakers, amplifiers and accessories.">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a class="visually-hidden-focusable" href="#main">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main">
  <header class="vg-page-header">
    <p class="vg-eyebrow mb-2">Full catalog</p>
    <h1>Shop</h1>
  </header>

  <section class="vg-section-tight" id="shopResultsTop">
    <div class="container">
      <div class="row g-4">
        <aside class="col-lg-3">
          <div class="vg-sidebar">
            <h2>Category</h2>
            <div class="d-flex flex-column gap-2 mb-4" id="categoryFilters" style="align-items:flex-start;"></div>

            <h2>Max price</h2>
            <label for="priceRange" class="visually-hidden">Maximum price</label>
            <input type="range" class="form-range" id="priceRange" min="20" max="1300" step="10" value="1300">
            <p class="vg-form-msg mb-0">Up to <strong id="priceRangeValue">$1300.00</strong></p>
          </div>
        </aside>

        <div class="col-lg-9">
          <div class="d-flex flex-wrap gap-3 justify-content-between align-items-center mb-3">
            <label for="shopSearchInput" class="visually-hidden">Search products</label>
            <input type="search" id="shopSearchInput" class="form-control" style="max-width:280px;" placeholder="Search this catalog&hellip;">
            <div class="d-flex align-items-center gap-2">
              <span id="shopResultCount" class="vg-form-msg mb-0" aria-live="polite"></span>
              <label for="sortSelect" class="visually-hidden">Sort products</label>
              <select id="sortSelect" class="form-select form-select-sm" style="width:auto;">
                <option value="featured">Featured</option>
                <option value="price-asc">Price: Low to High</option>
                <option value="price-desc">Price: High to Low</option>
                <option value="rating">Highest Rated</option>
                <option value="name">Name: A&ndash;Z</option>
              </select>
            </div>
          </div>

          <div class="row row-cols-1 row-cols-sm-2 row-cols-xl-3 g-4" id="productGrid"></div>
          <div id="shopEmpty" class="d-none"></div>
          <div id="shopPagination" class="mt-4"></div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>
<button id="backToTop" aria-label="Back to top"><i class="bi bi-arrow-up"></i></button>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/cart.js"></script>
<script src="js/wishlist.js"></script>
<script src="js/products.js"></script>
<script src="js/main.js"></script>
<script>
  renderShell('shop');
  initCategoryFilters();
  initShopControls();
  renderShopResults();
</script>
</body>
</html>
