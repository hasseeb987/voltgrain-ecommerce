<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Create account — Volt &amp; Grain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a class="visually-hidden-focusable" href="#main">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main">
  <section class="vg-section">
    <div class="container" style="max-width:460px;">
      <p class="vg-eyebrow mb-2 text-center">Join in</p>
      <h1 class="text-center mb-4" style="font-size:2rem;">Create an account</h1>
      <div class="vg-form-card">
        <form id="registerForm" novalidate>
          <div class="mb-3">
            <label for="name" class="form-label">Full name</label>
            <input type="text" class="form-control" id="name" name="name" required>
            <div class="invalid-feedback" data-error-for="name"></div>
          </div>
          <div class="mb-3">
            <label for="email" class="form-label">Email</label>
            <input type="email" class="form-control" id="email" name="email" required>
            <div class="invalid-feedback" data-error-for="email"></div>
          </div>
          <div class="mb-3">
            <label for="password" class="form-label">Password</label>
            <input type="password" class="form-control" id="password" name="password" required>
            <div class="invalid-feedback" data-error-for="password"></div>
          </div>
          <div class="mb-3">
            <label for="confirmPassword" class="form-label">Confirm password</label>
            <input type="password" class="form-control" id="confirmPassword" name="confirmPassword" required>
            <div class="invalid-feedback" data-error-for="confirmPassword"></div>
          </div>
          <button type="submit" class="btn vg-btn-primary vg-btn-lg w-100">Create account</button>
        </form>
        <p class="text-center vg-form-msg mt-3 mb-0">Already have one? <a href="login.html" class="vg-link-btn">Log in</a></p>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  renderShell('');
  bindRegisterForm();
</script>
</body>
</html>
