<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your account — Volt &amp; Grain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a class="visually-hidden-focusable" href="#main">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main">
  <header class="vg-page-header">
    <p class="vg-eyebrow mb-2">Your account</p>
    <h1>Account</h1>
  </header>

  <section class="vg-section-tight">
    <div class="container">
      <div id="accountGuest" class="d-none text-center">
        <div id="accountGuestEmpty"></div>
      </div>

      <div id="accountRoot" class="d-none">
        <div class="row g-4">
          <div class="col-lg-4">
            <div class="vg-form-card">
              <h2 class="mb-3" style="font-size:1.1rem;">Profile</h2>
              <p class="mb-1"><strong id="accountName"></strong></p>
              <p class="vg-form-msg mb-3" id="accountEmail"></p>
              <button class="btn vg-btn-secondary w-100" id="logoutBtn"><i class="bi bi-box-arrow-right"></i> Log out</button>
            </div>
          </div>
          <div class="col-lg-8">
            <h2 class="mb-3" style="font-size:1.1rem;">Order history</h2>
            <div id="accountOrders"></div>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  renderShell('');
  renderAccountPage();
  bindLogoutButton();
  document.getElementById('accountGuestEmpty').innerHTML = emptyStateTemplate({
    icon: 'bi-person-lock',
    title: 'You\u2019re not logged in',
    message: 'Log in to see your saved orders, or create an account in under a minute.',
    actionHref: 'login.html',
    actionLabel: 'Log in',
  });
</script>
</body>
</html>
