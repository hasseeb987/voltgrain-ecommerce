<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Contact — Volt &amp; Grain</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Big+Shoulders:wght@500;600;700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<link rel="stylesheet" href="css/style.css">
</head>
<body>
<a class="visually-hidden-focusable" href="#main">Skip to content</a>
<div id="navbar-placeholder"></div>

<main id="main">
  <header class="vg-page-header">
    <p class="vg-eyebrow mb-2">We read every message</p>
    <h1>Contact us</h1>
  </header>

  <section class="vg-section-tight">
    <div class="container">
      <div class="row g-5">
        <div class="col-lg-5">
          <h2 class="mb-3" style="font-size:1.2rem;">Other ways to reach us</h2>
          <ul class="vg-footer-list" style="color:var(--text-soft);">
            <li style="color:var(--text-soft);"><i class="bi bi-envelope"></i> support@voltandgrain.example</li>
            <li style="color:var(--text-soft);"><i class="bi bi-telephone"></i> +1 (555) 019&ndash;2044</li>
            <li style="color:var(--text-soft);"><i class="bi bi-geo-alt"></i> 118 Foundry Row, Portland, OR</li>
            <li style="color:var(--text-soft);"><i class="bi bi-clock"></i> Mon&ndash;Fri, 9am&ndash;5pm PT</li>
          </ul>
        </div>
        <div class="col-lg-7">
          <div class="vg-form-card">
            <form id="contactForm" novalidate>
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" required>
                <div class="invalid-feedback" data-error-for="name"></div>
              </div>
              <div class="mb-3">
                <label for="email" class="form-label">Email</label>
                <input type="email" class="form-control" id="email" name="email" required>
                <div class="invalid-feedback" data-error-for="email"></div>
              </div>
              <div class="mb-3">
                <label for="message" class="form-label">Message</label>
                <textarea class="form-control" id="message" name="message" rows="4" required></textarea>
                <div class="invalid-feedback" data-error-for="message"></div>
              </div>
              <button type="submit" class="btn vg-btn-primary vg-btn-lg">Send message</button>
              <p class="vg-form-msg vg-form-msg-success d-none mt-3" id="contactSuccess"><i class="bi bi-check-circle"></i> Message sent &mdash; we'll reply within one business day.</p>
            </form>
          </div>
        </div>
      </div>
    </div>
  </section>
</main>

<div id="footer-placeholder"></div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
<script src="js/data.js"></script>
<script src="js/storage.js"></script>
<script src="js/ui.js"></script>
<script src="js/cart.js"></script>
<script src="js/checkout.js"></script>
<script src="js/auth.js"></script>
<script src="js/main.js"></script>
<script>
  renderShell('contact');
  bindContactForm();
</script>
</body>
</html>
